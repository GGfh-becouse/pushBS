<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Brawl Counter</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0b1a3a,#1c2f6e);
    color:white;
}

/* 🔥 ЗОЛОТАЯ ПАНЕЛЬ */
.top-goal{
    position:fixed;
    top:0;
    width:100%;
    padding:15px;
    text-align:center;
    background:linear-gradient(90deg,#ffcc00,#ff9900);
    font-weight:bold;
    font-size:20px;
    box-shadow:0 0 20px rgba(255,200,0,0.8);
}

/* СЧЁТ */
#count{
    font-size:70px;
    margin-bottom:40px;
    text-shadow:0 0 15px #00f0ff;
}

/* КНОПКИ */
.buttons{
    display:flex;
    gap:25px;
}

button{
    width:90px;
    height:90px;
    font-size:45px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    transition:0.2s;
    box-shadow:0 8px 0 rgba(0,0,0,0.3);
}

.plus{
    background:linear-gradient(145deg,#00ff88,#00cc66);
}

.minus{
    background:linear-gradient(145deg,#ff4d4d,#cc0000);
}

button:active{
    transform:translateY(6px);
    box-shadow:0 2px 0 rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div class="top-goal">
🏆 ЦЕЛЬ ПОБЕД 🏆
</div>

<div id="count">0</div>

<div class="buttons">
    <button class="plus" onclick="change(1)">+</button>
    <button class="minus" onclick="change(-1)">−</button>
</div>

<script>
let count = 0;

function change(value){
    count += value;
    if(count < 0) count = 0;
    document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
