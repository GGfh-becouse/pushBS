<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Brawl Stars | Счётчик</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bowlby+One+SC&family=Montserrat:wght@400;600;700;800&display=swap');

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a2639, #0d1b2a);
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* Brawl Stars фон с паттерном */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.03) 2px, transparent 2px),
                radial-gradient(circle at 80% 70%, rgba(255, 215, 0, 0.03) 2px, transparent 2px),
                radial-gradient(circle at 40% 80%, rgba(255, 215, 0, 0.03) 3px, transparent 3px),
                radial-gradient(circle at 70% 20%, rgba(255, 215, 0, 0.03) 3px, transparent 3px);
            background-size: 100px 100px;
            pointer-events: none;
        }

        .container {
            background: rgba(20, 30, 45, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px 60px;
            border-radius: 60px;
            border: 3px solid #f3c950;
            box-shadow: 0 20px 0 #0a121b, 0 0 0 4px #f3c950 inset, 0 0 30px rgba(243, 201, 80, 0.3);
            position: relative;
            z-index: 10;
        }

        /* Декоративные уголки */
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #f3c950;
            filter: drop-shadow(0 0 8px #f3c950);
        }

        .corner-tl {
            top: 10px;
            left: 10px;
            border-right: none;
            border-bottom: none;
        }

        .corner-tr {
            top: 10px;
            right: 10px;
            border-left: none;
            border-bottom: none;
        }

        .corner-bl {
            bottom: 10px;
            left: 10px;
            border-right: none;
            border-top: none;
        }

        .corner-br {
            bottom: 10px;
            right: 10px;
            border-left: none;
            border-top: none;
        }

        /* Золотой заголовок */
        .title {
            font-family: 'Bowlby One SC', cursive;
            font-size: 2.2rem;
            background: linear-gradient(180deg, #f9e181 0%, #d4a017 50%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 4px 0 #6b4f0e, 0 8px 10px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            text-align: center;
            transform: perspective(500px) rotateX(3deg);
        }

        /* Счётчик */
        #count {
            font-family: 'Bowlby One SC', cursive;
            font-size: 120px;
            font-weight: 800;
            color: #f3c950;
            text-shadow: 0 8px 0 #6b4f0e, 0 15px 20px rgba(0,0,0,0.5);
            line-height: 1;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 4px;
            background: linear-gradient(145deg, #1f2d3f, #15212e);
            padding: 20px 40px;
            border-radius: 40px;
            border: 3px solid #3e5266;
            box-shadow: 0 10px 0 #0a121b, 0 0 0 4px #f3c950 inset;
            position: relative;
            min-width: 200px;
            text-align: center;
        }

        /* Подпись */
        .label {
            color: #8b9bb5;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: -15px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .buttons {
            display: flex;
            gap: 25px;
            justify-content: center;
        }

        button {
            width: 100px;
            height: 100px;
            font-size: 60px;
            font-weight: 800;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.1s;
            font-family: 'Bowlby One SC', cursive;
            box-shadow: 0 8px 0 #0f1a24, 0 0 0 4px #f3c950 inset;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .plus {
            background: linear-gradient(145deg, #2f4053, #1e2b3a);
            color: #4caf50;
        }

        .minus {
            background: linear-gradient(145deg, #2f4053, #1e2b3a);
            color: #f44336;
        }

        button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        button:hover {
            transform: translateY(-2px) scale(1.05);
            filter: brightness(1.2);
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #0f1a24, 0 0 0 4px #f3c950 inset;
        }

        /* Анимированный фон */
        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(243, 201, 80, 0.1) 0%, transparent 70%);
            animation: pulse 4s infinite;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        /* Примечание */
        .note {
            color: #8b9bb5;
            font-size: 0.7rem;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .note i {
            color: #f3c950;
            margin-right: 4px;
        }

        /* Адаптивность */
        @media (max-width: 500px) {
            .container {
                padding: 30px 30px;
            }

            #count {
                font-size: 80px;
                padding: 15px 25px;
            }

            button {
                width: 70px;
                height: 70px;
                font-size: 40px;
            }

            .title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    
    <div class="container">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="title">BRAWL STARS</div>
        
        <div id="count">0</div>
        <div class="label">⚔️ ПОБЕДЫ ⚔️</div>

        <div class="buttons">
            <button class="plus" onclick="change(1)">+1</button>
            <button class="minus" onclick="change(-1)">−1</button>
        </div>

        <div class="note">
            <i class="fas fa-trophy"></i> СЧИТАЙ СВОИ ПОБЕДЫ
        </div>
    </div>

    <script>
        let count = 0;

        function change(value) {
            count += value;
            document.getElementById("count").innerText = count;
            
            // Маленькая анимация при изменении
            const element = document.getElementById("count");
            element.style.transform = "scale(1.1)";
            setTimeout(() => {
                element.style.transform = "scale(1)";
            }, 100);
        }
    </script>

    <!-- Font Awesome для иконок -->
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
    <!-- Замените your-code на ваш Font Awesome kit или используйте CDN ниже -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>
