<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Brawl Goal System</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0b1a3a,#1c2f6e);
    color:white;
}

/* 🔶 ЦЕЛЬ */
.goal{
    position:fixed;
    top:0;
    width:100%;
    padding:12px;
    text-align:center;
    background:linear-gradient(90deg,#ffd700,#ffb300);
    font-weight:bold;
    font-size:18px;
    box-shadow:0 0 15px rgba(255,215,0,0.6);
}

/* Счёт */
#count{
    font-size:65px;
    margin-bottom:20px;
}

#target{
    font-size:40px;
    opacity:0.8;
    margin-bottom:40px;
}

/* Кнопки — менее заметные */
.buttons{
    display:flex;
    gap:20px;
}

button{
    width:70px;
    height:70px;
    font-size:35px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    background:rgba(255,255,255,0.15);
    color:white;
    transition:0.2s;
}

button:hover{
    background:rgba(255,255,255,0.25);
}

button:active{
    transform:scale(0.95);
}
</style>
</head>

<body>

<div class="goal">
🏆 ЦЕЛЬ ПОБЕД
</div>

<div id="target">Цель: 100</div>
<div id="count">0</div>

<div class="buttons">
    <button onclick="changeTarget(-1)">−</button>
    <button onclick="changeTarget(1)">+</button>
</div>

<br>

<div class="buttons">
    <button onclick="changeCount(-1)">−</button>
    <button onclick="changeCount(1)">+</button>
</div>

<script>
let count = 0;
let target = 100;

function changeCount(value){
    count += value;
    if(count < 0) count = 0;
    document.getElementById("count").innerText = count;
}

function changeTarget(value){
    target += value;
    if(target < 1) target = 1;
    document.getElementById("target").innerText = "Цель: " + target;
}
</script>

</body>
</html>
