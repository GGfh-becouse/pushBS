<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Счётчик</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
    }

    #count {
        font-size: 60px;
        margin-bottom: 30px;
    }

    .buttons {
        display: flex;
        gap: 20px;
    }

    button {
        width: 80px;
        height: 80px;
        font-size: 40px;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        transition: 0.2s;
    }

    .plus {
        background: #28a745;
        color: white;
    }

    .minus {
        background: #dc3545;
        color: white;
    }

    button:hover {
        transform: scale(1.1);
    }
</style>
</head>

<body>

<div id="count">0</div>

<div class="buttons">
    <button class="plus" onclick="change(1)">+</button>
    <button class="minus" onclick="change(-1)">−</button>
</div>

<script>
    let count = 0;

    function change(value) {
        count += value;
        document.getElementById("count").innerText = count;
    }
</script>

</body>
</html>
